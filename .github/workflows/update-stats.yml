name: Update player stats

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC (08:30 IST)
  workflow_dispatch:       # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch player stats
        run: node scripts/update-stats.mjs
        env:
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY }}

      - name: Commit if data changed
        run: |
          if [ -f data/player-stats.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git pull --rebase
            git add data/player-stats.json data/player-ids.json
            git diff --staged --quiet || (git commit -m "Update player stats" && git push)
          else
            echo "No stats file produced — nothing to commit."
          fi
