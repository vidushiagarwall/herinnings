name: Update match data

on:
  schedule:
    - cron: "30 2,8,14,20 * * *"   # four times a day (times in UTC)
  workflow_dispatch:                # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest women's matches
        run: node scripts/update-data.mjs
        env:
          CRICAPI_KEY: ${{ secrets.CRICAPI_KEY }}

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git diff --staged --quiet || (git commit -m "Update live match data" && git push)
